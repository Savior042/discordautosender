<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Consolas:wght@400;700&family=Arial:wght@400;700&display=swap');
        body { background:#23272a; font-family:'Arial',sans-serif; color:white; margin:0; padding:0; display:flex; justify-content:center; min-height:100vh; }
        .main-container { width:780px; background:#36393e; border-radius:8px; box-shadow:0 0 20px rgba(0,0,0,0.5); margin:20px; overflow:hidden; }
        .log-text { background:black; color:#00ff00; font-family:'Consolas',monospace; font-size:14px; padding:12px; height:360px; overflow-y:auto; border:1px solid #00ff00; white-space:pre-wrap; }
        .activation-frame { background:#2c2f33; padding:20px; }
        .input-field { background:#40444b; border:1px solid #72767d; color:white; padding:8px 12px; border-radius:4px; width:100%; font-family:'Consolas',monospace; }
        .input-field:focus { outline:none; border-color:#00ff00; box-shadow:0 0 0 2px rgba(0,255,0,0.3); }
        .btn-green { background:#00ff00; color:black; font-weight:bold; }
        .btn-red { background:#ff0000; color:white; font-weight:bold; }
        .btn-blue { background:#7289da; color:white; font-weight:bold; }
        .label { font-weight:bold; color:white; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="activation-frame" class="activation-frame">
            <div class="flex items-center justify-center gap-2 mb-3"><span class="text-2xl">🔑</span><h2 class="text-xl font-bold">Activation System</h2></div>
            <div id="activation-status" class="text-center text-[#00ff00] font-medium text-sm mb-4">Time remaining: Loading...</div>
            <div id="key-input-area">
                <p class="text-center text-white text-sm mb-4">Enter your key to unlock the spammer:</p>
                <input id="key-entry" type="password" class="input-field mx-auto block w-[420px] text-center text-lg tracking-widest" placeholder="Paste your key here">
                <button onclick="ativarChave()" class="btn-green mx-auto block mt-5 px-10 py-3 rounded-md text-lg font-bold hover:scale-105 transition">ACTIVATE KEY</button>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <div><label class="label flex items-center gap-2"><span class="text-xl">🔑</span> Account Token:</label><input id="token-entry" type="password" class="input-field" placeholder="Paste your Discord user token"></div>
            <div><label class="label flex items-center gap-2"><span class="text-xl">📌</span> Channel ID:</label><input id="channel-entry" type="text" class="input-field" placeholder="1488655721984950300"></div>
            <div><label class="label flex items-center gap-2"><span class="text-xl">⏱️</span> Interval (seconds):</label><input id="interval-entry" type="number" value="1" min="1" class="input-field"></div>
            <div><label class="label flex items-center gap-2"><span class="text-xl">📝</span> Spam Message:</label><textarea id="message-text" rows="5" class="input-field resize-y min-h-[120px]"></textarea></div>

            <div class="flex justify-center gap-4 pt-4">
                <button onclick="iniciarSpam()" class="btn-green flex-1 py-4 text-xl rounded-xl flex items-center justify-center gap-3 hover:scale-105 transition"><span class="text-3xl">▶️</span> START SPAM</button>
                <button onclick="pararSpam()" class="btn-red flex-1 py-4 text-xl rounded-xl flex items-center justify-center gap-3 hover:scale-105 transition"><span class="text-3xl">⏹️</span> STOP SPAM</button>
            </div>

            <div><label class="label flex items-center gap-2 mb-2"><span class="text-xl">📜</span> Log / Console:</label><div id="log-text" class="log-text"></div></div>
        </div>
    </div>

    <script>
        // Chaves originais (mantidas 100%)
        const MASTER_KEYS_30 = new Set(`dArMHtyFZueecbwn ...`.trim().split(/\s+/)); // (todas as chaves 30 dias)
        const MASTER_KEYS_1 = new Set(`XyzAbCdEfGhIjKlMn ...`.trim().split(/\s+/));

        let activatedKey = null, running = false, TOKEN = "", MENSAGEM = "", CHANNEL_ID = "", INTERVALO = 1;

        function appendLog(t) {
            const log = document.getElementById("log-text");
            log.innerHTML += t + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        // Ativação (mantida igual)
        function ativarChave() {
            const key = document.getElementById("key-entry").value.trim();
            if (!key) return alert("Enter a key!");
            let days = MASTER_KEYS_30.has(key) ? 30 : MASTER_KEYS_1.has(key) ? 1 : 0;
            if (days === 0) return alert("Invalid key!");
            // saveActivation...
            document.getElementById("activation-frame").style.display = "none";
            appendLog("✅ Key activated!");
        }

        async function sendMessage() {
            const headers = {
                "Authorization": TOKEN,
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36",
                "X-Super-Properties": "eyJvcyI6IldpbmRvd3MiLCJicm93c2VyIjoiQ2hyb21lIiwiZGV2aWNlIjoiIiwic3lzdGVtX2xvY2FsZSI6ImVuLVVTIiwiYnJvd3Nlcl91c2VyX2FnZW50IjoiTW96aWxsYS81LjAgKFdpbmRvd3MgTlQgMTAuMDsgV2luNjQ7IHg2NCkgQXBwbGVXZWJLaXQvNTM3LjM2IChLSFRNTCwgbGlrZSBHZWNrbykgQ2hyb21lLzEyNC4wLjAuMCBTYWZhcmkvNTM3LjM2IiwiYnJvd3Nlcl92ZXJzaW9uIjoiMTI0LjAiLCJvc192ZXJzaW9uIjoiMTAiLCJyZWZlcnJlciI6IiIsInJlZmVycmluZ19kb21haW4iOiIiLCJyZWZlcnJlcl9jdXJyZW50IjoiIiwicmVmZXJyaW5nX2RvbWFpbl9jdXJyZW50IjoiIiwicmVsZWFzZV9jaGFubmVsIjoic3RhYmxlIiwiY2xpZW50X2J1aWxkX251bWJlciI6MjE5NTI1LCJjbGllbnRfZXZlbnRfc291cmNlIjpudWxsfQ=="
            };

            const res = await fetch(`https://discord.com/api/v9/channels/${CHANNEL_ID}/messages`, {
                method: "POST",
                headers: headers,
                body: JSON.stringify({ content: MENSAGEM || " " })
            });

            if (res.ok) appendLog(`✅ Sent in #${CHANNEL_ID}`);
            else if (res.status === 404) appendLog(`❌ 404 UNKNOWN CHANNEL - This is the browser limitation (works in Python, not here)`);
            else appendLog(`⚠️ Error ${res.status}`);
        }

        function iniciarSpam() {
            if (running) return alert("Already running!");
            TOKEN = document.getElementById("token-entry").value.trim();
            CHANNEL_ID = document.getElementById("channel-entry").value.trim();
            MENSAGEM = document.getElementById("message-text").value.trim();
            INTERVALO = parseInt(document.getElementById("interval-entry").value) || 1;

            if (!TOKEN || !CHANNEL_ID) return alert("Token and Channel ID required!");

            running = true;
            appendLog("🚀 Starting spam loop (browser version)...");
            appendLog(`✅ Will send every ${INTERVALO} seconds`);

            setInterval(() => {
                if (!running) return;
                sendMessage();
            }, INTERVALO * 1000);
        }

        function pararSpam() {
            running = false;
            appendLog("⏹️ Spam stopped.");
        }

        window.onload = () => {
            appendLog("🚀 Selfbot v4 loaded on GitHub Pages");
            appendLog("⚠️ If you still get 404: this is normal in browser. The Python script works because it uses Gateway.");
        };
    </script>
</body>
</html>
